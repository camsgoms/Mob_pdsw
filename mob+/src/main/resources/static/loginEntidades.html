<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema de Caronas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Museo+Moderno:wght@400;700&display=swap');

        body {
            font-family: 'Museo Moderno', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* Cor de fundo mais clara para o corpo */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-family: 'Museo Moderno', Arial, sans-serif;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 24px;
            color: #0097B2; /* Cor de destaque */
        }

        button {
            padding: 10px 20px;
            color: #fff;
            background: linear-gradient(to right, #0097B2, #7ED957);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'Museo Moderno', Arial, sans-serif;
            font-size: 16px;
            width: 100%;
            height: 45px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #007a94;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Escolha o tipo de login</h2>
        <button onclick="window.location.href='/admin-login.html'">Administrador</button>
        <button onclick="window.location.href='/loginSenhaMotorista.html'">Motorista</button>
        <button onclick="window.location.href='/loginSenha.html'">Passageiro</button>
    </div>
</body>
</html>
