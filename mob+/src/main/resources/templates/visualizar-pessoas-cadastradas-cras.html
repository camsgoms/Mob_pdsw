<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Pessoas Cadastradas no CRAS</title>
    <link rel="stylesheet" href="/css/success.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 16px;
        }

        table thead th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: left;
        }

        table tbody td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        table tbody tr:hover {
            background-color: #f1f1f1;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        .btn-container a {
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn-container a:hover {
            background-color: #45a049;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pessoas Cadastradas no CRAS</h2>
        
        <!-- Verifica se há pessoas cadastradas -->
        <div th:if="${pessoas != null && !#lists.isEmpty(pessoas)}">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Deficiência</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Itera sobre a lista de pessoas cadastradas e exibe as informações -->
                    <tr th:each="pessoa : ${pessoas}">
                        <td th:text="${pessoa.nome}">Nome da Pessoa</td>
                        <td th:text="${pessoa.email}">Email da Pessoa</td>
                        <td th:text="${pessoa.deficiencia}">Deficiência</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Exibe uma mensagem caso não haja pessoas cadastradas -->
        <div th:if="${pessoas == null || #lists.isEmpty(pessoas)}">
            <p>Nenhuma pessoa cadastrada.</p>
        </div>

        <!-- Botão para voltar à página inicial -->
        <div class="btn-container">
            <a href="/success-cras">Voltar</a>
        </div>
    </div>
</body>
</html>
