<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Pessoa com Deficiência - CRAS</title>
    <link rel="stylesheet" href="/css/cadastro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Museo+Moderno:wght@400;700&display=swap">
</head>
<body>
    <div class="container">
        <h1>Cadastrar Pessoa com Deficiência - CRAS</h1>
        <form action="/cadastrar-pessoa-deficiencia-cras" method="post">
            <!-- Campo oculto para tipoCadastrador -->
            <input type="hidden" name="tipoCadastrador" value="pessoaDeficienciaCRAS">

            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Seu email" required>
            </div>
            <div>
                <label for="data-nascimento">Data de Nascimento:</label>
                <input type="date" id="data-nascimento" name="dataNascimento" required>
            </div>
            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Seu telefone">
            </div>
            <div>
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" placeholder="Seu endereço">
            </div>
            <div>
                <label for="deficiencia">Deficiência:</label>
                <input type="text" id="deficiencia" name="deficiencia" placeholder="Tipo de deficiência" required>
            </div>
            <div>
                <label for="tipo-deficiencia">Tipo de Deficiência:</label>
                <input type="text" id="tipo-deficiencia" name="tipoDeficiencia" placeholder="Especifique o tipo de deficiência" required>
            </div>
            <div>
                <label for="descricao">Descrição da Deficiência:</label>
                <textarea id="descricao" name="descricao" placeholder="Detalhes adicionais sobre a deficiência"></textarea>
            </div>
            <div>
                <label for="documento">Documento de Identidade:</label>
                <input type="text" id="documento" name="documento" placeholder="Número do documento">
            </div>
            <div>
                <label for="responsavel">Nome do Responsável (se aplicável):</label>
                <input type="text" id="responsavel" name="nomeResponsavel" placeholder="Nome do responsável">
            </div>
            <div>
                <label for="telefone-responsavel">Telefone do Responsável (se aplicável):</label>
                <input type="tel" id="telefone-responsavel" name="telefoneResponsavel" placeholder="Telefone do responsável">
            </div>
            <div>
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes" name="observacoes" placeholder="Observações adicionais"></textarea>
            </div>
            <div>
                <input type="checkbox" id="consentimento" name="consentimento" required>
                <label for="consentimento">Concordo com o tratamento dos meus dados pessoais conforme a política de privacidade.</label>
            </div>
            <div>
                <button type="submit">Cadastrar</button>
            </div>
            <a href="/success-cras">Voltar para a Página Inicial</a>
        </form>
    </div>
</body>
</html>
