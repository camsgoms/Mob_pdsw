<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Dados de Pessoa com Deficiência</title>
    <link rel="stylesheet" href="/css/alterar-dados-pessoa.css">
</head>
<body>
    <div class="container">
        <h1>Alterar Dados de Pessoa com Deficiência</h1>
        <form action="/alterar-dados-pessoa" method="post">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="deficiencia">Deficiência:</label>
                <input type="text" id="deficiencia" name="deficiencia" required>
            </div>
            <div>
                <label for="descricao">Descrição da Deficiência:</label>
                <textarea id="descricao" name="descricao" required></textarea>
            </div>
            <div>
                <label for="documento">Documento:</label>
                <input type="text" id="documento" name="documento" required>
            </div>
            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>
            <div>
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>
            <div>
                <label for="dataNascimento">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" name="dataNascimento" required>
            </div>
            <div>
                <label for="nomeResponsavel">Nome do Responsável:</label>
                <input type="text" id="nomeResponsavel" name="nomeResponsavel" required>
            </div>
            <div>
                <label for="telefoneResponsavel">Telefone do Responsável:</label>
                <input type="tel" id="telefoneResponsavel" name="telefoneResponsavel" required>
            </div>
            <div>
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes" name="observacoes"></textarea>
            </div>
            <div>
                <label for="tipoDeficiencia">Tipo de Deficiência:</label>
                <input type="text" id="tipoDeficiencia" name="tipoDeficiencia" required>
            </div>
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <button type="submit">Alterar Dados</button>
        </form>
        <a href="/success-pessoa">Voltar</a>
    </div>
</body>
</html>
